<div class="container">

  <h1>Employee Directory</h1>

  <table *ngIf="employees.length > 0; else noEmployees">
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Department</th>
    </tr>

    <tr *ngFor="let employee of employees">
      <td>{{ employee.id }}</td>
      <td>{{ employee.name }}</td>
      <td>{{ employee.department }}</td>
    </tr>
  </table>

  <ng-template #noEmployees>
    <h2>No Employees Available</h2>
  </ng-template>

</div>
